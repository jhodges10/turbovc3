name: Publish GitHub Package

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

concurrency:
  group: github-package-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, verify, and publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out the released tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Set up Node.js and GitHub Packages
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@jhodges10'
      - name: Set up Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0
      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@4528d102f7230f0e7b276855c01ea1159be0e984 # v16
        with:
          version: 6.0.2
      - name: Set up Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.8.3
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.8
      - run: npm ci
      - name: Verify release version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';
          const manifest = JSON.parse(await readFile('package.json', 'utf8'));
          const expected = `v${manifest.version}`;
          if (process.env.RELEASE_TAG !== expected) {
            throw new Error(`Release tag ${process.env.RELEASE_TAG} does not match ${expected}.`);
          }
          NODE
      - run: npm run check
      - run: npm run build:wasm
      - run: npm run build
      - run: npm run example:build
      - run: npm run api:report
      - run: npm test
      - run: npm run test:native
      - run: npm run test:native:sanitizers
      - run: REQUIRE_NATIVE_BENCH=1 npm run test:benchmark
      - run: npm run test:runtimes
      - name: Install release browser engines
        run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run test:browser
      - run: REQUIRE_WASM_ASSETS=1 npm run test:package
      - name: Pack release artifact
        run: |
          mkdir -p artifacts
          npm pack --pack-destination artifacts
      - name: Generate package and API compatibility report
        run: |
          TARBALL=$(find artifacts -maxdepth 1 -name '*.tgz' -print -quit)
          npm run release:report -- --tarball "$TARBALL" --output artifacts/release-report.json
      - name: Upload verified package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-package-${{ github.event.release.tag_name }}
          path: |
            artifacts/*.tgz
            artifacts/release-report.json
          if-no-files-found: error
      - name: Select npm distribution tag
        id: dist-tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            echo "value=next" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish artifacts/*.tgz --tag "${{ steps.dist-tag.outputs.value }}" --registry https://npm.pkg.github.com
